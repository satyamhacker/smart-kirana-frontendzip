kind = "web"
previewPath = "/"
title = "Smart Kirana Store"
version = "1.0.0"
id = "artifacts/store-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22344

[services.development]
run = "pnpm --filter @workspace/store-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/store-app", "run", "build" ]
publicDir = "artifacts/store-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22344"
BASE_PATH = "/"
